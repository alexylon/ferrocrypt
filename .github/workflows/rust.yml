name: Rust

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build workspace
        run: cargo build --verbose

      - name: Run workspace tests
        run: cargo test --verbose -- --test-threads=1

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.87.0
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.87.0

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build ferrocrypt-lib on MSRV
        run: cargo build -p ferrocrypt --verbose

      - name: Test ferrocrypt-lib on MSRV
        run: cargo test -p ferrocrypt --verbose

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain with rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  doc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps

  clippy:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain with clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run clippy with fuzzing feature
        run: cargo clippy --package ferrocrypt --features fuzzing --all-targets -- -D warnings

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run dependency audit
        run: cargo audit

  vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-vet
        run: cargo install --locked cargo-vet

      - name: Run supply-chain vet
        run: cargo vet

  desktop:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain with clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ferrocrypt-desktop

      - name: Install Slint system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libfontconfig-dev \
            libfreetype-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libssl-dev

      - name: Clippy ferrocrypt-desktop
        working-directory: ferrocrypt-desktop
        run: cargo clippy --all-targets -- -D warnings

      - name: Build ferrocrypt-desktop
        working-directory: ferrocrypt-desktop
        run: cargo build --verbose

      - name: Test ferrocrypt-desktop
        working-directory: ferrocrypt-desktop
        run: cargo test --verbose -- --test-threads=1

  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install nightly toolchain with clippy
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ferrocrypt-lib/fuzz

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Clippy fuzz crate
        working-directory: ferrocrypt-lib/fuzz
        run: cargo +nightly clippy --all-targets -- -D warnings

      - name: Build every fuzz target
        working-directory: ferrocrypt-lib/fuzz
        run: cargo +nightly fuzz build

      - name: Smoke-fuzz parser-surface targets (10s each)
        working-directory: ferrocrypt-lib/fuzz
        run: |
          set -euo pipefail
          # Every target except the two integration-level ones that run
          # a full Argon2id derivation per iteration — those are too
          # slow for a 10s smoke budget. They're still built above, so
          # API drift still fails the job.
          skip='^(fuzz_symmetric_decrypt|fuzz_hybrid_decrypt)$'
          # Capture to a variable so `set -e` trips if `fuzz list` fails.
          # Command substitution inside a `for ... in $(...)` word list
          # is not subject to fail-fast in bash.
          targets=$(cargo +nightly fuzz list)
          if [[ -z "$targets" ]]; then
            echo "::error::cargo fuzz list returned no targets"
            exit 1
          fi
          for target in $targets; do
            if [[ "$target" =~ $skip ]]; then
              echo "=== $target (skipped: integration-level) ==="
              continue
            fi
            echo "=== $target ==="
            cargo +nightly fuzz run "$target" -- -max_total_time=10
          done

      - name: Upload fuzz crash artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes
          path: |
            ferrocrypt-lib/fuzz/artifacts/
            ferrocrypt-lib/fuzz/corpus/
          if-no-files-found: ignore
          retention-days: 14
